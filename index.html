<!DOCTYPE html>
<html>
<head>
  <title>Your Key</title>
</head>
<body>
  <h2>Your 24h Key</h2>
  <p id="key">Generating...</p>

  <script>
    const SUPABASE_URL = "https://cazrwdipecalsfquoxqj.supabase.co";
    const SUPABASE_KEY = "sb_publishable_UbqD4Xl6_ykrLWQcp4AAMA_8N023AtU";

    function randomKey() {
      return [...crypto.getRandomValues(new Uint8Array(16))]
        .map(b => b.toString(16).padStart(2, "0"))
        .join("")
        .toUpperCase();
    }

    async function generateKey() {
      const key = randomKey();
      const expires = new Date(Date.now() + 24 * 60 * 60 * 1000).toISOString();

      await fetch(`${SUPABASE_URL}/rest/v1/keys`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "apikey": SUPABASE_KEY,
          "Authorization": `Bearer ${SUPABASE_KEY}`
        },
        body: JSON.stringify({ key, expires_at: expires })
      });

      document.getElementById("key").innerText = key;
    }

    generateKey();
  </script>
</body>
</html>
