<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get Your Key</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;700;800&display=swap');

    :root {
      --bg: #060608;
      --card: #0c0c10;
      --border: #1a1a24;
      --accent: #6e82ff;
      --green: #2dd4a0;
      --red: #f43f5e;
      --text: #e2e2f0;
      --muted: #52526a;
      --discord: #5865F2;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(110,130,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(110,130,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), #a78bfa);
    }

    h2 {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 6px;
      letter-spacing: -0.5px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 28px;
      line-height: 1.6;
    }

    #status { color: var(--muted); font-size: 12px; }

    .key-box {
      background: #0a0a0e;
      border: 1px solid var(--accent);
      border-radius: 10px;
      padding: 16px 20px;
      margin: 20px 0 16px;
      display: none;
    }

    .key-text {
      font-size: 13px;
      letter-spacing: 2px;
      color: var(--accent);
      word-break: break-all;
      line-height: 1.6;
    }

    .copy-btn {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 24px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      letter-spacing: 1px;
    }

    .copy-btn:hover { opacity: 0.85; }

    .note {
      color: var(--muted);
      font-size: 10px;
      margin-top: 12px;
      letter-spacing: 0.5px;
    }

    .error { color: var(--red); font-size: 12px; }

    /* DISCORD CARD */
    .discord-card {
      background: #0e0f1a;
      border: 1px solid #2a2d4a;
      border-radius: 16px;
      padding: 24px 28px;
      display: flex;
      align-items: center;
      gap: 20px;
      position: relative;
      overflow: hidden;
      text-decoration: none;
      transition: transform 0.2s, border-color 0.2s;
    }

    .discord-card:hover {
      transform: translateY(-2px);
      border-color: var(--discord);
    }

    .discord-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 0% 50%, rgba(88,101,242,0.12), transparent 70%);
      pointer-events: none;
    }

    .discord-icon {
      width: 48px;
      height: 48px;
      background: var(--discord);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .discord-icon svg {
      width: 26px;
      height: 26px;
      fill: white;
    }

    .discord-text { flex: 1; text-align: left; }

    .discord-label {
      font-size: 10px;
      color: #5865F2;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 4px;
      font-weight: 600;
    }

    .discord-title {
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    .discord-sub {
      font-size: 10px;
      color: var(--muted);
      margin-top: 3px;
    }

    .discord-arrow {
      color: var(--discord);
      font-size: 18px;
      flex-shrink: 0;
      transition: transform 0.2s;
    }

    .discord-card:hover .discord-arrow { transform: translateX(4px); }

    /* pulse ring on discord icon */
    .discord-icon::after {
      content: '';
      position: absolute;
      width: 48px;
      height: 48px;
      border: 2px solid var(--discord);
      border-radius: 14px;
      opacity: 0;
      animation: ring 2.5s ease-out infinite;
    }

    @keyframes ring {
      0% { opacity: 0.6; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.5); }
    }
  </style>
</head>
<body>
  <div class="wrapper">

    <!-- KEY CARD -->
    <div class="card">
      <h2>Your 24h Key</h2>
      <p class="subtitle">Complete the checkpoint to receive<br>your free key — valid for 24 hours.</p>
      <div id="status">Verifying your completion...</div>
      <div class="key-box" id="key-box">
        <div class="key-text" id="key-display"></div>
      </div>
      <div id="copy-wrap" style="display:none">
        <button class="copy-btn" onclick="copyKey()">COPY KEY</button>
        <p class="note" id="key-note">This key expires in 24 hours.</p>
      </div>
    </div>

    <!-- DISCORD CARD -->
    <a class="discord-card" href="https://discord.gg/bxu2WMjNjN" target="_blank">
      <div class="discord-icon" style="position:relative">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.032.054a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/>
        </svg>
      </div>
      <div class="discord-text">
        <div class="discord-label">Community</div>
        <div class="discord-title">Join the Discord</div>
        <div class="discord-sub">Updates, support & releases</div>
      </div>
      <div class="discord-arrow">→</div>
    </a>

  </div>

  <script>
    const WORKER_URL = "https://keyverify.ivyckdemal.workers.dev";

    async function getKey() {
      const params = new URLSearchParams(window.location.search);
      const token = params.get("token");

      if (!token) {
        document.getElementById("status").innerHTML = '<span class="error">⚠ You must complete the checkpoint first!</span>';
        return;
      }

      try {
        const res = await fetch(WORKER_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token })
        });

        const data = await res.json();

        if (data.error) {
          document.getElementById("status").innerHTML = `<span class="error">⚠ ${data.error}</span>`;
          return;
        }

        document.getElementById("status").style.display = "none";
        document.getElementById("key-display").innerText = data.key;
        document.getElementById("key-box").style.display = "block";
        document.getElementById("copy-wrap").style.display = "block";

        if (data.existing) {
          document.getElementById("key-note").innerText = "You already have a valid key — here it is again!";
        }

      } catch (e) {
        document.getElementById("status").innerHTML = '<span class="error">⚠ Something went wrong. Try again.</span>';
      }
    }

    function copyKey() {
      navigator.clipboard.writeText(document.getElementById("key-display").innerText);
      document.querySelector(".copy-btn").innerText = "✓ COPIED!";
      setTimeout(() => document.querySelector(".copy-btn").innerText = "COPY KEY", 2000);
    }

    getKey();
  </script>
</body>
</html>
